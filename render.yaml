services:
  - type: web
    name: sandoo-digital-menu
    runtime: docker
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: ":memory:"
